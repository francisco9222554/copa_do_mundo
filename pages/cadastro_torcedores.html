<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0">
    <title>Cadastro de Torcedores</title>
    <link rel="stylesheet" href="../css/index.css">
    <script src="../js/script.js"></script>
</head>
<body>

    <form action="./resultado.html">

    <div class="cadastro">
    <form>

    <div class=Menu>
        <li><a href="./../index.html">Página Inicial</a></li>
        <li><a href="../pages/classificatórias.html">Classificatórias</a></li>
    </div>

    <button type="button" onclick="alternarTema()" id="tema">
🌙 Tema Escuro
</button>

    <div class="nome">
        <label class="textlabel">Nome:</label>
        <input id="nome" class="campotexto" type="text" name="nome" placeholder="Nome Completo" required onfocus="campoSelecionado()" onblur="campoNormal()" onkeyup="digitandoNome()">
    </div>

    <div class="nascimento">
        <label class="textlabel">Data de Nascimento:</label>
        <input id="data_nascimento" class="campotexto" type="date" name="data_nascimento" required>
    </div>

    <div class="email">
        <label class="textlabel">Email:</label>
        <input id="email" class="campotexto" type="email" name="email" placeholder="Insira seu email" required>
    </div>

    <div class="pais">
        <label class="selectlabel">País:</label>
        <select id="select_pais" class="select" onchange="paisAlterado()">
            <option value="belgica">Belgica</option>
            <option value="estados unidos">Estados Unidos</option>
            <option value="mexico">Mexico</option>
            <option value="paraguai">Paraguai</option>
            <option value="canada">Canada</option>
            <option value="alemanha">Alemanha</option>
            <option value="japao">Japao</option>
            <option value="australia">Australia</option>
            <option value="holanda">Holanda</option>
        </select>
            
        <label class="selectlabel">Jogador Favorito:</label>
            <select id="select_jogador" class="select">
            <option value="matt turner">Matt Turner</option>
            <option value="chris brandy">Chris Brandy</option>
            <option value="matt freese">Matt Freese</option>

            <option value="christian pulisic">Christian Pulisic</option>
            <option value="sergino dest">Sergino Dest</option>
            <option value="antonee robinson">Antonee Robinson</option>
            <option value="chris richards">Chris Richards</option>
            <option value="joe scally">Joe Scally</option>
            <option value="mark mckenzie">Mark McKenzie</option>
            <option value="auston trusty">Auston Trusty</option>
            <option value="miles robinson">Miles Robinson</option>
            <option value="tim beam">Tim Beam</option>
            <option value="alex freeman">Alex Freeman</option>
            <option value="max arfsten">Max Arfsten</option>

            <option value="weston mckennie">Weston McKennie</option>
            <option value="tyler adams">Tyler Adams</option>
            <option value="gio reyna">Gio Reyna</option>
            <option value="malik tillman">Malik Tillman</option>
            <option value="cristian roldan">Cristian Roldan</option>
            <option value="sebastian berhalter">Sebastian Berhalter</option>

            <option value="folarin bolagu">Folarin Balogu</option>
            <option value="ricardo pepi">Ricardo Pepi</option>
            <option value="timothy weah">Timothy Weah</option>
            <option value="brenden aaronson">Brenden Aaronson</option>
            <option value="haji wright">Haji Wright</option>
            <option value="alejandro zendejas">Alejandro Zendejas</option>
        </select>
        </div>

    <button id="enviar" type="submit">Enviar</button>
    </form>
    </div>

</body>
</html>
